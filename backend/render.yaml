services:
  - type: web
    name: vuurkorf-backend
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: UPLOAD_DIR
        value: /opt/render/project/uploads
      - key: OUTPUT_DIR
        value: /opt/render/project/outputs
    disk:
      name: vuurkorf-data
      mountPath: /opt/render/project
      sizeGB: 1
